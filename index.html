<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Premier University — Exam Routine (Spring 2025, CSE Dept.)</title>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary: #0a3d62;
            --accent: #fbb13c;
            --text: #111;
            --muted: #555;
            --bg: #f9fafb;
            --card-bg: #fff;
            --border: #d1d5db;
            --highlight: #fff59d;
            --done-bg: #c8e6c9;
            --sem7: #e0f7fa;
            --sem5: #f3e8ff;
            --sem2: #fff3e0;
        }
        
        body.dark {
            --primary: #9ad3ff;
            --accent: #ffb86b;
            --text: #ecf0f1;
            --muted: #cbd5e1;
            --bg: #0b1220;
            --card-bg: #061224;
            --border: #162336;
            --highlight: #4b5563;
            --done-bg: #013220;
            --sem7: #042f2e;
            --sem5: #2a133f;
            --sem2: #2b1b00;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .container {
            max-width: 1040px;
            margin: 28px auto;
            padding: 26px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(2, 6, 23, .08);
        }
        
        header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        header img {
            height: 64px;
            margin: 0 auto 6px;
            display: block;
        }
        
        header h1 {
            font-family: 'Merriweather', serif;
            font-size: 26px;
            margin: 0;
            color: var(--primary);
        }
        
        header h2 {
            font-size: 15px;
            color: var(--muted);
            margin: 6px 0;
        }
        
        .accent-bar {
            width: 120px;
            height: 6px;
            background: var(--accent);
            margin: 10px auto;
            border-radius: 4px;
        }
        
        .banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--primary), #0e6fa4);
            color: #fff;
            margin-bottom: 14px;
            font-weight: 600;
        }
        
        .banner .marquee {
            white-space: nowrap;
            overflow: hidden;
            flex: 1;
            margin-right: 10px;
        }
        
        .banner .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marq 12s linear infinite;
        }
        
        @keyframes marq {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }
        
        #liveDate {
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        select,
        input[type=search],
        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
            background: transparent;
            color: var(--text);
        }
        
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .summary {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin: 14px 0;
            flex-wrap: wrap;
        }
        
        .summary .stat {
            background: rgba(0, 0, 0, .03);
            padding: 10px 12px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }
        
        .progress-wrap {
            flex: 1;
            min-width: 220px;
            margin-left: 8px;
        }
        
        .progress {
            height: 12px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }
        
        .progress>i {
            display: block;
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 600ms ease;
        }
        
        .table-container {
            position: relative;
        }
        
        .table-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 320px;
            opacity: 0.05;
            transform: translate(-50%, -50%) rotate(-25deg);
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }
        
        .table-watermark img {
            width: 100%;
            height: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        
        th,
        td {
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: center;
        }
        
        th {
            background: var(--primary);
            color: #fff;
        }
        
        tr.sem-7th {
            background-color: var(--sem7);
        }
        
        tr.sem-5th {
            background-color: var(--sem5);
        }
        
        tr.sem-2nd {
            background-color: var(--sem2);
        }
        
        tr.done {
            background-color: var(--done-bg);
        }
        
        tr.next-exam {
            background-color: var(--highlight);
            font-weight: 700;
        }
        
        @media (max-width:820px) {
            table {
                display: none;
            }
            .cards {
                display: block;
            }
        }
        
        @media (min-width:821px) {
            .cards {
                display: none;
            }
        }
        
        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--card-bg);
            display: flex;
            gap: 12px;
        }
        
        .card .meta {
            flex: 0 0 130px;
            font-size: 13px;
            color: var(--muted);
        }
        
        .card .main {
            flex: 1;
        }
        
        .chip {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(0, 0, 0, .04);
            font-weight: 600;
            font-size: 12px;
        }
        
        footer {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }
        
        .sign-line {
            border-top: 1px solid #aaa;
            width: 180px;
            margin: 0 auto 6px;
        }
        
        @media print {
            body {
                background: #fff;
            }
            .controls,
            .banner,
            #liveDate {
                display: none;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <img src="https://puc.ac.bd/Content/new-template-assets/images/puc_logo.png" alt="PUC Logo">

            <h1>Premier University, Chattogram</h1>
            <h2>Department of Computer Science & Engineering</h2>

            <div class="accent-bar"></div>

            <p>Examination Routine — <strong>Spring 2025</strong></p>
        </header>

        <div class="banner">
            <div class="marquee">
                <span>All the Best for Your Exams! • Stay Calm • Good Luck!</span>
            </div>

            <button id="themeToggle">🌗 Theme</button>
        </div>

        <div id="liveDate"></div>

        <div class="controls">
            <select id="semesterFilter">
                <option value="all">All Semesters</option>
                <option value="7th">7th CSE</option>
                <option value="5th">5th CSE</option>
                <option value="2nd">2nd CSE</option>
            </select>

            <input type="search" id="searchInput" placeholder="Search course...">

            <button id="printBtn" class="btn">Print</button>
        </div>

        <div class="summary">
            <div class="stat">
                <div>Total Exams</div>
                <div id="totalCount">0</div>
            </div>

            <div class="stat">
                <div>Done</div>
                <div id="doneCount">0</div>
            </div>

            <div class="stat">
                <div>Upcoming</div>
                <div id="upcomingCount">0</div>
            </div>

            <div class="progress-wrap">
                <div class="progress">
                    <i id="progressBar"></i>
                </div>
            </div>
        </div>

        <div class="table-container">

            <div class="table-watermark">
                <img src="https://puc.ac.bd/Content/new-template-assets/images/puc_logo.png">
            </div>

            <table id="routineTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Semester</th>
                        <th>Code</th>
                        <th>Course Title</th>
                        <th>Time Left</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>

            <div class="cards" id="cardList"></div>
        </div>

        <footer>
            <div>
                <div class="sign-line"></div>
                <small>Head, Department of CSE</small>
            </div>

            <div>
                <div class="sign-line"></div>
                <small>Controller of Examinations</small>
            </div>
        </footer>

    </div>

    <script>
        const rows = [

            {
                dateLabel: 'Monday, May 04, 2026',
                time: '09:30AM – 12:30PM',
                semester: '2nd',
                code: 'DMNT',
                title: 'Discrete Mathematics & Number Theory',
                iso: '2026-05-04T09:30:00'
            },

            {
                dateLabel: 'Tuesday, May 05, 2026',
                time: '01:30PM – 04:30PM',
                semester: '7th',
                code: 'CC',
                title: 'Cloud Computing',
                iso: '2026-05-05T13:30:00'
            },

            {
                dateLabel: 'Monday, May 11, 2026',
                time: '01:30PM – 04:30PM',
                semester: '7th',
                code: 'TOC',
                title: 'Theory Of Computation',
                iso: '2026-05-11T14:00:00'
            },

            {
                dateLabel: 'Wednesday, May 13, 2026',
                time: '01:30PM – 04:30PM',
                semester: '5th',
                code: 'AI',
                title: 'Artificial Intelligence',
                iso: '2026-05-13T14:00:00'
            },

            {
                dateLabel: 'Saturday, May 16, 2026',
                time: '01:30PM – 04:30PM',
                semester: '7th',
                code: 'STQ',
                title: 'Software Testing And Quality',
                iso: '2026-05-16T14:00:00'
            },

            {
                dateLabel: 'Tuesday, May 19, 2026',
                time: '09:30AM – 01:30PM',
                semester: '2nd',
                code: 'EDC',
                title: 'Electrical Device And Circuit',
                iso: '2026-05-19T09:30:00'
            },

            {
                dateLabel: 'Wednesday, May 20, 2026',
                time: '01:30PM – 04:30PM',
                semester: '7th',
                code: 'SEEP',
                title: 'Society, Engineering and Environmental Protection',
                iso: '2026-05-20T14:00:00'
            },

            {
                dateLabel: 'Monday, May 25, 2026',
                time: '01:30PM – 04:30PM',
                semester: '7th',
                code: 'ML',
                title: 'Machine Learning',
                iso: '2026-05-25T14:00:00'
            }

        ];

        const tbody = document.querySelector('#routineTable tbody');
        const cardList = document.getElementById('cardList');

        const semesterFilter = document.getElementById('semesterFilter');
        const searchInput = document.getElementById('searchInput');

        const totalCount = document.getElementById('totalCount');
        const doneCount = document.getElementById('doneCount');
        const upcomingCount = document.getElementById('upcomingCount');

        const progressBar = document.getElementById('progressBar');

        function filteredRows() {

            const sem = semesterFilter.value;
            const q = searchInput.value.toLowerCase();

            return rows.filter(r => {

                if (sem !== 'all' && r.semester !== sem) return false;

                return (
                    r.title.toLowerCase().includes(q) ||
                    r.code.toLowerCase().includes(q)
                );
            });
        }

        function renderAll() {

            const data = filteredRows();

            renderTable(data);
            renderCards(data);
            updateSummary(data);
        }

        function renderTable(data) {

            tbody.innerHTML = '';

            const now = new Date();

            let nextIndex = null;
            let minDiff = Infinity;

            data.forEach((r, i) => {

                const diff = new Date(r.iso) - now;

                if (diff > 0 && diff < minDiff) {
                    minDiff = diff;
                    nextIndex = i;
                }
            });

            data.forEach((r, i) => {

                const tr = document.createElement('tr');

                tr.classList.add(`sem-${r.semester}`);

                const diff = new Date(r.iso) - now;

                if (diff <= 0) tr.classList.add('done');

                if (i === nextIndex) tr.classList.add('next-exam');

                tr.innerHTML = `
                    <td>${r.dateLabel}</td>
                    <td>${r.time}</td>
                    <td>${r.semester} CSE</td>
                    <td>${r.code}</td>
                    <td style="text-align:left">${r.title}</td>
                    <td class="timeleft" data-iso="${r.iso}">--</td>
                `;

                tbody.appendChild(tr);
            });
        }

        function renderCards(data) {

            cardList.innerHTML = '';

            data.forEach(r => {

                const card = document.createElement('div');

                card.className = 'card';

                card.innerHTML = `
                    <div class="meta">
                        <div>${r.dateLabel}</div>
                        <div>${r.time}</div>
                        <div>${r.semester} CSE</div>
                    </div>

                    <div class="main">
                        <div><strong>${r.code}</strong> — ${r.title}</div>

                        <div class="chip">
                            Time Left:
                            <span class="timeleft" data-iso="${r.iso}">--</span>
                        </div>
                    </div>
                `;

                cardList.appendChild(card);
            });
        }

        function updateSummary(data) {

            const now = new Date();

            const total = data.length;

            const done = data.filter(r => new Date(r.iso) < now).length;

            const upcoming = total - done;

            totalCount.textContent = total;
            doneCount.textContent = done;
            upcomingCount.textContent = upcoming;

            progressBar.style.width =
                total ? ((done / total) * 100) + '%' : '0%';
        }

        function updateCountdowns() {

            document.querySelectorAll('.timeleft').forEach(el => {

                const iso = el.dataset.iso;

                const diff = new Date(iso) - new Date();

                if (diff <= 0) {

                    el.textContent = 'Done';

                    return;
                }

                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);

                el.textContent = `${d}d ${h}h ${m}m ${s}s`;
            });
        }

        function updateLiveDate() {

            document.getElementById('liveDate').textContent =
                'Today: ' +
                new Date().toLocaleString('en-GB', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
        }

        semesterFilter.addEventListener('change', renderAll);

        searchInput.addEventListener('input', renderAll);

        document.getElementById('themeToggle')
            .addEventListener('click', () => {

                document.body.classList.toggle('dark');
            });

        document.getElementById('printBtn')
            .addEventListener('click', () => {

                window.print();
            });

        setInterval(updateCountdowns, 1000);

        updateLiveDate();

        renderAll();
    </script>

</body>

</html>
